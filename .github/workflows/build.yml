name: Build ImmortalWrt 25.12 NN6000 V2 DAED BTF


on:
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:


    - name: Clone ImmortalWrt 25.12

      run: |

        git clone \
        --depth=1 \
        -b openwrt-25.12 \
        https://github.com/immortalwrt/immortalwrt.git source



    - name: Install dependencies

      run: |

        sudo apt update

        sudo apt install -y \
        build-essential \
        clang \
        flex \
        bison \
        gawk \
        gettext \
        git \
        libncurses-dev \
        libssl-dev \
        python3 \
        python3-pyelftools \
        python3-setuptools \
        rsync \
        subversion \
        swig \
        unzip \
        wget \
        zlib1g-dev \
        file \
        zstd \
        dwarves \
        pahole



    - name: Update feeds

      run: |

        cd source

        ./scripts/feeds update -a

        ./scripts/feeds install -a



    - name: Select NN6000 V2

      run: |

        cd source


        rm -f .config


        echo "CONFIG_TARGET_qualcommax=y" >> .config

        echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config

        echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config



        make defconfig



    - name: Add packages and kernel features

      run: |

        cd source



        #
        # DAED dependency
        #

        ./scripts/config \
        -e PACKAGE_kmod-sched-core \
        -e PACKAGE_kmod-sched-bpf \
        -e PACKAGE_kmod-xdp-sockets-diag \
        -e PACKAGE_kmod-veth



        #
        # Qualcomm switch

        ./scripts/config \
        -e PACKAGE_kmod-qca-ssdk



        #
        # Firewall

        ./scripts/config \
        -e PACKAGE_firewall4 \
        -e PACKAGE_nftables



        #
        # IPv6

        ./scripts/config \
        -e PACKAGE_ipv6helper \
        -e PACKAGE_odhcp6c \
        -e PACKAGE_odhcpd-ipv6only \
        -e PACKAGE_kmod-nf-conntrack6 \
        -e PACKAGE_kmod-nft-nat6



        #
        # DNS

        ./scripts/config \
        -e PACKAGE_dnsmasq-full



        #
        # WireGuard

        ./scripts/config \
        -e PACKAGE_kmod-wireguard \
        -e PACKAGE_wireguard-tools \
        -e PACKAGE_luci-proto-wireguard



        #
        # HTTPS

        ./scripts/config \
        -e PACKAGE_ca-bundle \
        -e PACKAGE_ca-certificates



        #
        # eBPF

        ./scripts/config \
        -e BPF \
        -e BPF_SYSCALL \
        -e BPF_JIT \
        -e BPF_EVENTS \
        -e CGROUP_BPF \
        -e NET_CLS_BPF \
        -e NET_ACT_BPF



        #
        # BTF

        ./scripts/config \
        -e DEBUG_INFO \
        -e DEBUG_INFO_BTF \
        -e DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT \
        -d DEBUG_INFO_REDUCED



        make defconfig



    - name: Download

      run: |

        cd source

        make download -j8



    - name: Compile

      run: |

        cd source

        make -j$(nproc) V=s



    - name: Check device

      run: |

        cd source


        echo "===== DEVICE CHECK ====="


        grep -R "nn6000" \
        bin/targets/qualcommax/ipq60xx/ \
        || true




    - name: Check BTF

      run: |

        cd source


        VMLINUX=$(find build_dir \
        -name vmlinux \
        -path "*qualcommax*" | head -1)



        if [ -z "$VMLINUX" ]; then

          echo "vmlinux not found"

          exit 0

        fi



        echo "checking $VMLINUX"



        readelf -S "$VMLINUX" | grep BTF || true




    - name: Upload firmware

      uses: actions/upload-artifact@v4


      with:

        name: ImmortalWrt-25.12-NN6000-V2-DAED-BTF


        path: |

          source/bin/targets/qualcommax/ipq60xx/*
