name: Build ImmortalWrt NN6000 V2 DAED BTF

on:
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-22.04


    steps:

    - name: Clone ImmortalWrt 25.12
      run: |
        git clone --depth=1 \
        -b openwrt-25.12 \
        https://github.com/immortalwrt/immortalwrt.git source


    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
        build-essential \
        clang \
        flex \
        bison \
        gawk \
        gettext \
        git \
        libncurses-dev \
        libssl-dev \
        python3 \
        python3-pyelftools \
        python3-setuptools \
        rsync \
        subversion \
        swig \
        unzip \
        wget \
        zstd \
        dwarves \
        pahole


    - name: Update feeds
      run: |
        cd source

        ./scripts/feeds update -a
        ./scripts/feeds install -a



    - name: Select NN6000 V2 profile
      run: |

        cd source


        # 使用官方 profile
        make defconfig


        echo '
CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y
CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y
' >> .config


        make defconfig



    - name: Add packages
      run: |

        cd source


        cat >> .config <<EOF


# LuCI
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-ssl=y


# DNS
CONFIG_PACKAGE_dnsmasq-full=y


# IPv6
CONFIG_PACKAGE_ipv6helper=y
CONFIG_PACKAGE_odhcp6c=y
CONFIG_PACKAGE_odhcpd-ipv6only=y


# Firewall
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y


# Qualcomm switch
CONFIG_PACKAGE_kmod-qca-ssdk=y


# DAED dependencies

CONFIG_PACKAGE_kmod-sched-core=y
CONFIG_PACKAGE_kmod-sched-bpf=y
CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
CONFIG_PACKAGE_kmod-veth=y


# eBPF

CONFIG_KERNEL_BPF=y
CONFIG_KERNEL_BPF_SYSCALL=y
CONFIG_KERNEL_BPF_JIT=y
CONFIG_KERNEL_BPF_EVENTS=y
CONFIG_KERNEL_CGROUP_BPF=y
CONFIG_KERNEL_NET_CLS_BPF=y
CONFIG_KERNEL_NET_ACT_BPF=y


# BTF

CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_INFO_BTF=y
CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT=y
CONFIG_DEBUG_INFO_REDUCED=n


# WireGuard

CONFIG_PACKAGE_kmod-wireguard=y
CONFIG_PACKAGE_wireguard-tools=y


# tools

CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_ca-bundle=y
CONFIG_PACKAGE_ca-certificates=y


EOF


        make defconfig



    - name: Compile

      run: |

        cd source

        make download -j8

        make -j$(nproc) V=s



    - name: Verify device

      run: |

        cd source


        echo "===== DEVICE CHECK ====="

        grep -R "link,nn6000-v2" \
        bin/targets/qualcommax/ipq60xx/ || true



    - name: Verify BTF

      run: |

        cd source


        VMLINUX=$(find build_dir \
        -name vmlinux \
        -path "*qualcommax*" | head -1)


        readelf -S "$VMLINUX" | grep BTF || true



    - name: Upload

      uses: actions/upload-artifact@v4

      with:

        name: NN6000-V2-ImmortalWrt25.12-DAED-BTF

        path:

          source/bin/targets/qualcommax/ipq60xx/*
