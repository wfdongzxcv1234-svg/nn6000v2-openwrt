name: Build ImmortalWrt NN6000 V2 DAED

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 \
          https://github.com/immortalwrt/immortalwrt.git source


      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            subversion \
            swig \
            unzip \
            wget \
            zlib1g-dev \
            file \
            zstd


      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update -a

          ./scripts/feeds install -a


      - name: Configure NN6000 V2

        run: |

          cd source


          cat > .config <<'EOF'

CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y
CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y


# LuCI

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y


# Firewall

CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_nftables=y


# DNS

CONFIG_PACKAGE_dnsmasq-full=y


# PPPoE

CONFIG_PACKAGE_ppp=y
CONFIG_PACKAGE_ppp-mod-pppoe=y


# IPv6

CONFIG_PACKAGE_ipv6helper=y


# ZRAM

CONFIG_PACKAGE_zram-swap=y


# Tools

CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_nano=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget-ssl=y


# HTTPS

CONFIG_PACKAGE_ca-bundle=y
CONFIG_PACKAGE_ca-certificates=y



# ===== DAED eBPF =====


CONFIG_KERNEL_BPF=y
CONFIG_KERNEL_BPF_SYSCALL=y
CONFIG_KERNEL_BPF_JIT=y
CONFIG_KERNEL_BPF_EVENTS=y

CONFIG_KERNEL_XDP_SOCKETS=y


# ===== BTF support =====


CONFIG_KERNEL_DEBUG_INFO=y
CONFIG_KERNEL_DEBUG_INFO_BTF=y
CONFIG_KERNEL_DEBUG_INFO_BTF_MODULES=y


EOF


          make defconfig



      - name: Check target device

        run: |

          cd source

          echo "===== DEVICE CHECK ====="

          grep -i nn6000 .config || true

          echo "===== TARGET INFO ====="

          grep -i nn6000 tmp/.targetinfo || true



      - name: Download packages

        run: |

          cd source

          make download -j8


      - name: Compile firmware

        run: |

          cd source

          make -j$(nproc) V=s


      - name: Check firmware

        run: |

          cd source

          ls -lh bin/targets/qualcommax/ipq60xx/


      - name: Upload firmware

        uses: actions/upload-artifact@v4

        with:

          name: ImmortalWrt-NN6000-V2-DAED

          path: |

            source/bin/targets/qualcommax/ipq60xx/*sysupgrade.bin

            source/bin/targets/qualcommax/ipq60xx/*initramfs*
