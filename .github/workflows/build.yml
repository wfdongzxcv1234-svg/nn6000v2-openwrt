name: Build ImmortalWrt NN6000 V2 DAED BTF

"on":
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 \
          https://github.com/immortalwrt/immortalwrt.git source


      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            subversion \
            swig \
            unzip \
            wget \
            zlib1g-dev \
            file \
            zstd \
            dwarves


      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update -a
          ./scripts/feeds install -a


      - name: Configure NN6000 V2
        run: |
          cd source


          #
          # Target
          #

          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config


          #
          # LuCI
          #

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config


          #
          # Firewall4
          #

          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_nftables=y"


          #
          # DNS
          #

          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config


          #
          # PPPoE
          #

          echo "CONFIG_PACKAGE_ppp=y" >> .config
          echo "CONFIG_PACKAGE_ppp-mod-pppoe=y" >> .config


          #
          # IPv6
          #

          echo "CONFIG_PACKAGE_ipv6helper=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nf-conntrack6=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-fib=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-nat6=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-offload=y" >> .config



          #
          # ZRAM
          #

          echo "CONFIG_PACKAGE_zram-swap=y" >> .config


          #
          # DAED required kernel modules
          #

          echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
          echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
          echo "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" >> .config


          #
          # eBPF
          #

          echo "CONFIG_KERNEL_BPF=y" >> .config
          echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> .config
          echo "CONFIG_KERNEL_BPF_JIT=y" >> .config
          echo "CONFIG_KERNEL_BPF_EVENTS=y" >> .config
          echo "CONFIG_KERNEL_XDP_SOCKETS=y" >> .config


          #
          # BTF support (解决 dae no BTF found)
          #

          echo "CONFIG_KERNEL_DEBUG_INFO=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_BTF=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_BTF_MODULES=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_REDUCED=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT=y" >> .config


          #
          # pahole
          #

          echo "CONFIG_PAHOLE=y" >> .config


          #
          # Tools
          #

          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_ca-certificates=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config


          #
          # First normalize
          #

          make defconfig


          #
          # Force BTF after defconfig
          #

          echo "CONFIG_KERNEL_DEBUG_INFO=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_BTF=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_BTF_MODULES=y" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_REDUCED=n" >> .config
          echo "CONFIG_KERNEL_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT=y" >> .config


          make defconfig



      - name: Download packages
        run: |
          cd source

          make download -j8



      - name: Compile firmware
        run: |
          cd source

          make -j$(nproc) V=s



      - name: Check BTF
        run: |
          cd source

          grep CONFIG_KERNEL_DEBUG_INFO_BTF .config || true



      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NN6000-V2-DAED-BTF
          path: |
            source/bin/targets/qualcommax/ipq60xx/*-sysupgrade.bin
            source/bin/targets/qualcommax/ipq60xx/*-initramfs*
