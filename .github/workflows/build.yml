name: Build ImmortalWrt NN6000 V2


on:
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-22.04


    steps:

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git source


      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pip \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            unzip \
            wget \
            zstd \
            file


      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a


      - name: Configure NN6000 V2
        run: |
          cd source

          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config

          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          echo "CONFIG_PACKAGE_ip-full=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config

          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config

          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config

          echo "CONFIG_PACKAGE_block-mount=y" >> .config

          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_IMAGES_PAD=y" >> .config

          make defconfig


      - name: Download packages
        run: |
          cd source
          make download -j8


      - name: Compile firmware
        run: |
          cd source
          make -j$(nproc) V=s


      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-NN6000-V2
          path: |
            source/bin/targets/qualcommax/ipq60xx/*
