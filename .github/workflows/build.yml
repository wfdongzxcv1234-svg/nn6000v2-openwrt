name: Build ImmortalWrt NN6000 V2 DAED kmods

on:
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:


    - name: Clone ImmortalWrt
      run: |
        git clone --depth=1 \
        https://github.com/immortalwrt/immortalwrt.git source


    - name: Install dependencies
      run: |

        sudo apt update

        sudo apt install -y \
          build-essential \
          clang \
          flex \
          bison \
          gawk \
          gettext \
          git \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-pyelftools \
          rsync \
          unzip \
          wget \
          zlib1g-dev \
          file \
          zstd \
          dwarves \
          pahole



    - name: Update feeds
      run: |

        cd source

        ./scripts/feeds update -a

        ./scripts/feeds install -a



    - name: Configure

      run: |

        cd source


        rm -f .config


        #
        # NN6000 V2
        #

        echo "CONFIG_TARGET_qualcommax=y" >> .config
        echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
        echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config



        #
        # LuCI
        #

        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-base=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config



        #
        # Firewall4 nftables
        #

        echo "CONFIG_PACKAGE_firewall4=y" >> .config
        echo "CONFIG_PACKAGE_nftables=y"



        #
        # DNS
        #

        echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config



        #
        # IPv6
        #

        echo "CONFIG_PACKAGE_ipv6helper=y" >> .config
        echo "CONFIG_PACKAGE_odhcp6c=y" >> .config
        echo "CONFIG_PACKAGE_odhcpd-ipv6only=y" >> .config



        #
        # DAED kernel modules
        #

        echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
        echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
        echo "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" >> .config



        #
        # eBPF
        #

        echo "CONFIG_KERNEL_BPF=y" >> .config
        echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> .config
        echo "CONFIG_KERNEL_BPF_JIT=y" >> .config
        echo "CONFIG_KERNEL_CGROUP_BPF=y" >> .config



        #
        # BTF
        #

        echo "CONFIG_KERNEL_DEBUG_INFO=y" >> .config
        echo "CONFIG_KERNEL_DEBUG_INFO_BTF=y" >> .config
        echo "CONFIG_KERNEL_DEBUG_INFO_REDUCED=n" >> .config



        #
        # tools
        #

        echo "CONFIG_PACKAGE_curl=y" >> .config
        echo "CONFIG_PACKAGE_ca-bundle=y"
        echo "CONFIG_PACKAGE_ca-certificates=y"



        #
        # normalize
        #

        make defconfig



    - name: Compile

      run: |

        cd source

        make download -j8

        make -j$(nproc) V=s



    - name: Check XDP BTF

      run: |

        cd source

        grep BTF .config || true

        find build_dir -name vmlinux | head



    - name: Upload

      uses: actions/upload-artifact@v4

      with:

        name: NN6000-V2-ImmortalWrt-DAED

        path: |

          source/bin/targets/qualcommax/ipq60xx/*-sysupgrade.bin

          source/bin/targets/qualcommax/ipq60xx/packages/*
