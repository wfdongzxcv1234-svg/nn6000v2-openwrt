name: Build ImmortalWrt NN6000 V2 kmod for DAED

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 \
          https://github.com/immortalwrt/immortalwrt.git source


      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            subversion \
            swig \
            unzip \
            wget \
            zlib1g-dev \
            file \
            zstd


      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update base packages luci

          ./scripts/feeds install -a


      - name: Configure NN6000 V2
        run: |
          cd source


          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config


          #
          # LuCI
          #

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config


          #
          # DAED 需要的 kernel module
          #

          echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
          echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
          echo "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-bridge=y"


          #
          # BPF / XDP
          #

          echo "CONFIG_KERNEL_BPF=y" >> .config
          echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> .config
          echo "CONFIG_KERNEL_BPF_EVENTS=y" >> .config
          echo "CONFIG_KERNEL_XDP_SOCKETS=y" >> .config


          #
          # 基础工具
          #

          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config


          #
          # 不使用 zram
          #

          echo "# CONFIG_PACKAGE_zram-swap is not set" >> .config


          make defconfig


      - name: Download packages
        run: |
          cd source

          make download -j8


      - name: Compile firmware
        run: |
          cd source

          make -j$(nproc) V=s


      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: NN6000-V2-kmod-DAED
          path: |
            source/bin/targets/qualcommax/ipq60xx/*-sysupgrade.bin
            source/bin/targets/qualcommax/ipq60xx/*-initramfs*
            source/bin/targets/qualcommax/ipq60xx/packages/*
