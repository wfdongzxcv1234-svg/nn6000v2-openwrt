name: Build NN6000 V2 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
            python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev
          sudo apt-get install -y dwarves
          pahole --version

      - name: Clone ImmortalWrt source
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: source/dl
          key: dl-${{ hashFiles('source/feeds.conf.default') }}
          restore-keys: |
            dl-

      - name: Configure NN6000 V2
        run: |
          cd source
          rm -f .config

          echo "CONFIG_DEBUG_INFO=y" >> target/linux/qualcommax/config-6.12
          echo "CONFIG_DEBUG_INFO_BTF=y" >> target/linux/qualcommax/config-6.12
          echo "CONFIG_DEBUG_INFO_BTF_MODULES=y" >> target/linux/qualcommax/config-6.12
          echo "# CONFIG_DEBUG_INFO_REDUCED is not set" >> target/linux/qualcommax/config-6.12

          echo "CONFIG_TARGET_qualcommax=y" > .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
          echo "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y" >> .config

          echo "CONFIG_KERNEL_BPF=y" >> .config
          echo "CONFIG_KERNEL_BPF_SYSCALL=y" >> .config
          echo "CONFIG_KERNEL_XDP_SOCKETS=y" >> .config
          echo "CONFIG_BPF_JIT=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config

          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config

          echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
          echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
          echo "CONFIG_PACKAGE_kmod-xdp-sockets-diag=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-bridge=y" >> .config

          echo "CONFIG_PACKAGE_ipv6helper=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          echo "CONFIG_PACKAGE_odhcp6c=y" >> .config
          echo "CONFIG_PACKAGE_odhcpd-ipv6only=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-ipv6=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-nat6=y" >> .config

          echo "CONFIG_PACKAGE_sqm-scripts=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-sqm=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-sqm-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-cake=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-fq-codel=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ifb=y" >> .config

          echo "CONFIG_PACKAGE_kmod-qca-nss-ecm=y" >> .config
          echo "CONFIG_PACKAGE_kmod-qca-nss-sfe=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-bridge=y" >> .config
          echo "CONFIG_PACKAGE_swconfig=y" >> .config

          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_nftables=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-fib=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-nat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config

          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config

          echo "# CONFIG_PACKAGE_zram-swap is not set" >> .config

          make defconfig

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: |
            source/staging_dir/host*
            source/staging_dir/toolchain-*
            source/build_dir/toolchain-*
          key: toolchain-nn6000v2-${{ hashFiles('source/target/linux/qualcommax/config-6.12') }}
          restore-keys: |
            toolchain-nn6000v2-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-nn6000v2-${{ github.run_id }}
          restore-keys: |
            ccache-nn6000v2-

      - name: Build firmware
        run: |
          cd source
          export CCACHE_DIR=~/.ccache
          make -j$(nproc) 2>&1 | tee build.log

      - name: Debug - check actual kernel .config used
        run: |
          cd source
          KCONFIG=$(find build_dir -maxdepth 4 -name .config \
            -path "*linux-qualcommax_ipq60xx/linux-*" \
            ! -path "*backports*" ! -path "*mac80211*" | head -n1)
          echo "内核 config 路径: $KCONFIG"
          if [ -z "$KCONFIG" ]; then
            echo "没找到主内核 .config，列出该目录结构方便排查："
            find build_dir/target-aarch64_cortex-a53_musl/linux-qualcommax_ipq60xx -maxdepth 1 -type d
          else
            grep -i "debug_info\|btf" "$KCONFIG" || echo "文件存在但没有 BTF/DEBUG_INFO 相关行"
          fi

      - name: Debug - grep BTF related lines from build log
        run: |
          cd source
          if [ ! -f build.log ]; then
            echo "::error::build.log 不存在，说明上一步 Build firmware 没有正常生成日志文件"
            exit 1
          fi
          echo "===== pahole 相关 ====="
          grep -i "pahole" build.log || echo "没有 pahole 相关日志"
          echo "===== BTF 相关 ====="
          grep -i "btf" build.log | head -80 || echo "没有 BTF 相关日志"

      - name: Verify BTF was generated
        run: |
          cd source
          VMLINUX=$(find build_dir -type f -name vmlinux -path "*qualcommax*" | head -n1)
          if [ -z "$VMLINUX" ]; then
            echo "::warning::未找到 vmlinux，跳过 BTF 检查"
            exit 0
          fi
          echo "检查文件: $VMLINUX"
          if readelf -S "$VMLINUX" 2>/dev/null | grep -q '\.BTF'; then
            echo "✅ BTF section 存在"
          else
            echo "::error::vmlinux 中没有 .BTF section！"
            exit 1
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nn6000-v2-firmware
          path: source/bin/targets/**/*
