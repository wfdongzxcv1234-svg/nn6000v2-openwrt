- name: Debug - check actual kernel .config used
        run: |
          cd source
          KCONFIG=$(find build_dir -name .config -path "*linux-qualcommax_ipq60xx*" | head -n1)
          echo "内核 config 路径: $KCONFIG"
          grep -i "debug_info\|btf" "$KCONFIG" || echo "没找到任何 BTF/DEBUG_INFO 相关行"
