name: Build OpenWrt for NN6000 V2 (with eBPF & daed)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/nn6000_ebpf.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo -E apt-get -qq update
        # 核心提示：此处必须安装 dwarves 包，它包含编译 BTF 所需的 pahole 工具
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison bzip2 ccache cmake cpio curl device-tree-compiler dwarves fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip xallsys vim wget xmlto xz-utils zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "${TZ}"
        mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds & daed
      run: |
        cd openwrt
        # 注入 daed 官方维护的 openwrt 编译源
        echo "src-git daed https://github.com/sbwml/luci-app-daed.git;main" >> ${{ env:FEEDS_CONF }}
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e ${{ env:CONFIG_FILE }} ] && cp ${{ env:CONFIG_FILE }} openwrt/.config
        cd openwrt
        
        # 【核心黑魔法】利用脚本直接强制开启内核的 eBPF 和 BTF 编译参数，免去手动 menuconfig
        echo "CONFIG_BPF_SYSCALL=y" >> target/linux/qualcommax/config-6.6
        echo "CONFIG_DEBUG_INFO=y" >> target/linux/qualcommax/config-6.6
        echo "CONFIG_DEBUG_INFO_BTF=y" >> target/linux/qualcommax/config-6.6
        
        # 刷新并校验配置
        make defconfig

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8
        find package -name "dl" -description -exec ls -a {} +

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 首次编译 eBPF 内核较重，先用多线程提高速度，若报错会自动转为单线程排查
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: OpenWrt_NN6000_v2_daed
        path: openwrt/bin/targets/qualcommax/ipq60xx/*
