name: Build NN6000 V2 OpenWrt eBPF daed

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-22.04


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Free disk space
      run: |

        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc



    - name: Install build dependencies
      run: |

        sudo apt update

        sudo apt install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gettext \
          git \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          rsync \
          unzip \
          zstd \
          file



    - name: Clone OpenWrt 25.12

      run: |

        git clone https://github.com/openwrt/openwrt.git

        cd openwrt

        git checkout openwrt-25.12



    - name: Update feeds

      run: |

        cd openwrt

        ./scripts/feeds update -a

        ./scripts/feeds install -a



    - name: Create config

      run: |

        cd openwrt


        cat > .config <<'EOF'


#
# Target
#

CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y

CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_link_nn6000-v2=y



#
# LuCI
#

CONFIG_PACKAGE_luci=y

CONFIG_PACKAGE_luci-ssl=y

CONFIG_PACKAGE_luci-app-firewall=y



#
# eBPF
#

CONFIG_KERNEL_BPF_SYSCALL=y

CONFIG_KERNEL_BPF_JIT=y

CONFIG_KERNEL_BPF_JIT_ALWAYS_ON=y


CONFIG_KERNEL_CGROUPS=y

CONFIG_KERNEL_CGROUP_BPF=y


CONFIG_KERNEL_NET_CLS_BPF=y

CONFIG_KERNEL_NET_ACT_BPF=y


CONFIG_KERNEL_BPF_EVENTS=y



#
# XDP
#

CONFIG_KERNEL_XDP_SOCKETS=y

CONFIG_PACKAGE_kmod-xdp-sockets-diag=y



#
# BPF tools
#

CONFIG_PACKAGE_bpftool=y



#
# nft / tproxy
#

CONFIG_PACKAGE_kmod-nft-tproxy=y

CONFIG_PACKAGE_kmod-nft-socket=y


CONFIG_PACKAGE_kmod-nft-core=y



#
# DAED
#

CONFIG_PACKAGE_kmod-tun=y



#
# WireGuard
#

CONFIG_PACKAGE_kmod-wireguard=y

CONFIG_PACKAGE_wireguard-tools=y



#
# DNS
#

CONFIG_PACKAGE_dnsmasq-full=y


CONFIG_PACKAGE_adguardhome=y



#
# Network tools
#

CONFIG_PACKAGE_htop=y

CONFIG_PACKAGE_tcpdump=y

CONFIG_PACKAGE_ip-full=y

CONFIG_PACKAGE_ethtool=y



#
# SSL
#

CONFIG_PACKAGE_ca-bundle=y

CONFIG_PACKAGE_ca-certificates=y

CONFIG_PACKAGE_curl=y



#
# Utilities
#

CONFIG_PACKAGE_vim-full=y

CONFIG_PACKAGE_procps-ng=y



#
# No zram
#

# CONFIG_PACKAGE_zram-swap is not set



EOF



        make defconfig



    - name: Compile firmware

      run: |

        cd openwrt

        make download -j8

        make -j$(nproc) V=s



    - name: Upload firmware

      uses: actions/upload-artifact@v4

      with:

        name: NN6000V2-eBPF-daed

        path: |

          openwrt/bin/targets/qualcommax/ipq60xx/*
